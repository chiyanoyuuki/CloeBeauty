; Limites d'upload pour le mode admin (déposé dans /backend/api/).
; o2switch (PHP-FPM/LiteSpeed) prend en charge .user.ini.
; Les images sont déjà compressées côté navigateur ; ces valeurs couvrent
; aussi les vidéos d'accueil.
upload_max_filesize = 64M
post_max_size = 66M
max_execution_time = 120
memory_limit = 256M
